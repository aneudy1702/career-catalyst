# This workflow will run tests using node and then publish a package to the npm registry when a release is published
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm install
      - run: npm test
      - run: npm pack --dry-run
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}

  notify-on-failure:
    name: Email alert on publish failure
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: failure()
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@2cea9617b09d83a5f1e78b3093f2669d45e7203a # v3.12.0
        with:
          server_address: ${{ secrets.MAIL_SMTP_SERVER }}
          server_port: ${{ secrets.MAIL_SMTP_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: ${{ secrets.MAIL_USERNAME }}
          subject: "❌ npm publish failed — ${{ github.repository }} ${{ github.ref_name }}"
          body: |
            The npm publish workflow failed for ${{ github.repository }}.

            Release: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Check the workflow logs at the link above to diagnose the failure.
